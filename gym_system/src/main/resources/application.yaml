spring:
  application:
    name: gym_system
  server.port: 8080
  datasource:
        url: jdbc:postgresql://localhost:5432/gym_system_db
        username: mohamed
        password: mohamed
        driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
app:
  jwt:
    secret: gym-system-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
    expiration: 86400000
logging:
  level:
    com:
      gym: DEBUG



